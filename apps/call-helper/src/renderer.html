<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer Call</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 13px;
        background: #111827;
        color: #e2e8f0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        user-select: none;
        -webkit-app-region: drag; /* allow window drag */
      }

      /* ── Title bar ───────────────────────────────────────── */
      .titlebar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        background: #0f172a;
        border-bottom: 1px solid #1e293b;
        flex-shrink: 0;
        -webkit-app-region: drag;
      }
      .titlebar-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #22c55e;
        flex-shrink: 0;
      }
      .titlebar-dot.inactive { background: #475569; }
      .titlebar-title {
        font-size: 12px;
        color: #94a3b8;
        font-weight: 500;
        flex: 1;
      }
      #statusBadge {
        font-size: 11px;
        color: #94a3b8;
        background: #1e293b;
        border-radius: 10px;
        padding: 2px 8px;
        -webkit-app-region: no-drag;
      }

      /* ── Video grid ──────────────────────────────────────── */
      .video-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        padding: 6px;
        flex: 1;
        min-height: 0;
      }

      .video-tile {
        position: relative;
        background: #1e293b;
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .video-tile video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .video-label {
        position: absolute;
        bottom: 6px;
        left: 8px;
        font-size: 11px;
        color: #e2e8f0;
        background: rgba(0, 0, 0, 0.55);
        padding: 2px 7px;
        border-radius: 6px;
      }

      .video-placeholder {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        color: #475569;
      }
      .video-placeholder svg { opacity: 0.5; }
      .video-placeholder span { font-size: 11px; }

      /* ── Status / permission banner ─────────────────────── */
      #banner {
        padding: 8px 12px;
        background: #1e293b;
        border-top: 1px solid #1e3a5f;
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        flex-shrink: 0;
        min-height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      #banner.error {
        background: #450a0a;
        color: #fca5a5;
        border-top-color: #7f1d1d;
      }
      #banner.ok {
        background: #052e16;
        color: #86efac;
        border-top-color: #14532d;
      }
    </style>
  </head>
  <body>
    <!-- Title bar -->
    <div class="titlebar">
      <div class="titlebar-dot inactive" id="statusDot"></div>
      <span class="titlebar-title">Multiplayer Call</span>
      <span id="statusBadge">Waiting…</span>
    </div>

    <!-- Video tiles -->
    <div class="video-grid">
      <div class="video-tile" id="localTile">
        <div class="video-placeholder" id="localPlaceholder">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <span>You</span>
        </div>
        <video id="localVideo" muted autoplay playsinline style="display:none"></video>
        <div class="video-label">You</div>
      </div>
      <div class="video-tile" id="remoteTile">
        <div class="video-placeholder" id="remotePlaceholder">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
          <span>Remote</span>
        </div>
        <video id="remoteVideo" autoplay playsinline style="display:none"></video>
        <div class="video-label">Remote</div>
      </div>
    </div>

    <!-- Status banner -->
    <div id="banner">Requesting permissions from your system…</div>

    <script src="renderer.js"></script>
  </body>
</html>
