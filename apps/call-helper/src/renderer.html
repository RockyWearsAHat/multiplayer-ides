<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Multiplayer Call Bar</title>
    <style>
      * { box-sizing: border-box; }

      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
        color: #e5edf8;
        overflow: hidden;
        user-select: none;
      }

      .call-bar {
        height: 100vh;
        width: 100vw;
        display: grid;
        grid-template-columns: minmax(160px, 1fr) auto;
        align-items: center;
        gap: 12px;
        padding: 10px;
        border-radius: 14px;
        border: 1px solid rgba(108, 144, 188, 0.35);
        background: linear-gradient(130deg, rgba(10, 17, 30, 0.97), rgba(17, 30, 47, 0.92));
        box-shadow:
          0 12px 28px rgba(3, 9, 19, 0.45),
          inset 0 1px 0 rgba(203, 226, 255, 0.1);
        -webkit-app-region: drag;
      }

      .status {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #4c607c;
        flex-shrink: 0;
      }

      .status-dot.live {
        background: #5ed59f;
        box-shadow: 0 0 10px rgba(94, 213, 159, 0.55);
      }

      .status-copy {
        min-width: 0;
        display: grid;
        gap: 2px;
      }

      .status-copy .title {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: rgba(160, 192, 232, 0.9);
      }

      .status-copy .detail {
        margin: 0;
        font-size: 12px;
        font-weight: 600;
        color: rgba(226, 237, 248, 0.92);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        -webkit-app-region: no-drag;
      }

      .btn {
        height: 34px;
        min-width: 66px;
        border-radius: 10px;
        border: 1px solid rgba(106, 141, 184, 0.34);
        background: rgba(17, 29, 45, 0.8);
        color: rgba(230, 240, 255, 0.92);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.01em;
        padding: 0 12px;
        cursor: pointer;
      }

      .btn:disabled {
        opacity: 0.42;
        cursor: not-allowed;
      }

      .btn:hover:not(:disabled) {
        border-color: rgba(111, 198, 255, 0.7);
        background: rgba(22, 42, 64, 0.88);
      }

      .btn.warn {
        border-color: rgba(237, 131, 131, 0.42);
        color: #ffd0d0;
      }

      .btn.warn:hover:not(:disabled) {
        border-color: rgba(255, 138, 138, 0.8);
        background: rgba(68, 23, 23, 0.88);
      }

      .btn.off {
        background: rgba(68, 23, 23, 0.6);
        border-color: rgba(237, 131, 131, 0.52);
        color: #ffc8c8;
      }

      .btn.end {
        min-width: 76px;
        background: rgba(86, 26, 26, 0.88);
        border-color: rgba(255, 125, 125, 0.62);
        color: #ffd7d7;
      }

      .btn.end:hover:not(:disabled) {
        background: rgba(112, 30, 30, 0.95);
        border-color: rgba(255, 133, 133, 0.88);
      }
    </style>
  </head>
  <body>
    <div class="call-bar" role="group" aria-label="Floating call controls">
      <div class="status">
        <span id="statusDot" class="status-dot" aria-hidden="true"></span>
        <div class="status-copy">
          <p class="title">Live Call</p>
          <p id="statusDetail" class="detail">Waiting for call…</p>
        </div>
      </div>

      <div class="controls">
        <button id="muteBtn" class="btn" type="button" disabled>Mute</button>
        <button id="camBtn" class="btn" type="button" disabled>Cam Off</button>
        <button id="endBtn" class="btn end" type="button" disabled>Hang Up</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
